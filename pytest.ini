[pytest]
# Pytest configuration for logsum tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test markers for categorizing tests
markers =
    normalization: Tests for field normalization rules
    grouping: Tests for event grouping logic
    aggregation: Tests for count and timestamp aggregation
    edge_case: Tests for edge cases (missing level, malformed timestamps, etc.)
    csv: Tests for CSV parsing edge cases
    cli: Tests for CLI flags and exit codes
    integration: Integration tests combining multiple features

# Minimum Python version
minversion = 3.7

# Test paths
testpaths = tests
